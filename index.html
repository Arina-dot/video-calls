<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Класс Видеосвязи</title>
    <!-- Подключаем официальный быстрый скрипт Jitsi -->
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #141419;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #meet-container {
            flex: 1;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- В этом блоке мгновенно откроется готовый видеочат -->
    <div id="meet-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room');

        if (!roomName) {
            document.body.innerHTML = '<h2 style="color:white; text-align:center; margin-top:50px;">Пожалуйста, укажите комнату в ссылке. Например: ?room=ivan</h2>';
        } else {
            // Запускаем видеосвязь на стабильном основном сервере
            const domain = 'meet.jit.si';
            const options = {
                roomName: `arina-private-room-id-${roomName}`,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet-container'),
                lang: 'ru', // Полностью русский интерфейс
                
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false,
                    disableDeepLinking: true, // Не просит скачивать приложения
                    prejoinPageEnabled: false // Вход в звонок сразу без экранов ожидания
                },
                
                interfaceConfigOverwrite: {
                    // Оставляем только нужные вам функции
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'hangup', 'pip', 'fullscreen', 'settings'
                    ],
                    SETTINGS_SECTIONS: ['devices', 'language']
                }
            };

            // Создаем видеочат
            const api = new JitsiMeetExternalAPI(domain, options);
        }
    </script>
</body>
</html>
