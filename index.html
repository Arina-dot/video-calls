<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн-класс Арины</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #141419;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
            text-align: center;
        }
        .card {
            background: #202028;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
        }
        h1 { margin: 0 0 15px 0; color: #00ff88; font-size: 1.8rem; }
        p { font-size: 1.1rem; color: #aaa; margin: 0 0 35px 0; line-height: 1.5; }
        .btn-link {
            background: linear-gradient(135deg, #0077ff, #0055cc);
            color: white;
            text-decoration: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 6px 20px rgba(0, 119, 255, 0.4);
            transition: all 0.2s ease;
            display: inline-block;
        }
        .btn-link:hover { 
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(0, 119, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Онлайн-класс Арины</h1>
        <p>Здравствуйте! Рада видеть вас на уроке. Нажмите на кнопку ниже, чтобы войти в виртуальный класс.</p>
        
        <!-- Вставьте вашу ссылку из VK Звонков между кавычками вместо слова ССЫЛКА -->
        <a href="ССЫЛКА" class="btn-link">👉 Войти на урок</a>
    </div>

</body>
</html>
