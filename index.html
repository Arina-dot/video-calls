<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Класс Видеосвязи</title>
    <!-- Подключаем официальную библиотеку видеокомнат, которая заменит нестабильный PeerJS -->
    <script src="https://8x8.vc"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #141419;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        #meet-container {
            flex: 1;
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        .error-message {
            color: #ff4d4d;
            font-weight: bold;
            text-align: center;
            max-width: 500px;
            margin-top: 50px;
            align-self: center;
        }
    </style>
</head>
<body>

    <!-- В этом блоке автоматически откроется видеосвязь со всеми кнопками -->
    <div id="meet-container"></div>

    <div id="error-screen" class="error-message" style="display: none;"></div>
    <script>
        // Считываем имя комнаты из ссылки (например, ?room=ivan)
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room');

        const errorScreen = document.getElementById('error-screen');
        const meetContainer = document.getElementById('meet-container');

        if (!roomName) {
            meetContainer.style.display = 'none';
            errorScreen.innerHTML = `
                <h2>Комната не указана</h2>
                <p>Пожалуйста, добавьте имя комнаты в конец ссылки.</p>
                <p>Пример: в конце адреса вашего сайта допишите <b>?room=ivan</b></p>
            `;
            errorScreen.style.display = 'block';
        } else {
            // Запускаем профессиональную видеокомнату
            // Используем выделенный сервер 8x8 (создатели Jitsi), он работает стабильно в РФ
            const domain = '8x8.vc'; 
            
            const options = {
                // Создаем уникальный адрес комнаты на основе вашего репозитория и имени ученика
                roomName: `vpaas-magic-cookie-43bd12bb673c4f7499694e9f90597143/arina-calls-${roomName}`,
                width: '100%',
                height: '100%',
                parentNode: meetContainer,
                lang: 'ru', // Полностью русский интерфейс
                
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false,
                    disableDeepLinking: true, // Ученику не будет предлагать скачать приложение
                    prejoinPageEnabled: false, // Вход в звонок СРАЗУ, без лишних экранов ожидания
                    
                    // Встроенное мощное шумоподавление и эхоподавление
                    audioQuality: {
                        stereo: false
                    },
                    backgroundBlurVideoProcessor: {
                        enabled: true
                    }
                },
                
                interfaceConfigOverwrite: {
                    // Оставляем только те кнопки, которые вы просили (микрофон, камера, картинка в картинке, завершить)
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'hangup', 'pip', 'fullscreen', 'settings'
                    ],
                    SETTINGS_SECTIONS: ['devices', 'language']
                }
            };

            // Браузер сам создаст подключение без каких-либо кнопок "Позвонить"
            const api = new JitsiMeetExternalAPI(domain, options);
        }
    </script>
</body>
</html>
